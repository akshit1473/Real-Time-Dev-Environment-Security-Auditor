<!DOCTYPE html>
<html>
<head>
  <title>DevSec Auditor</title>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: monospace;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #38bdf8;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .audit { background: #22c55e; color: black; }
    .attack { background: #ef4444; color: white; }

    .terminal {
      background: #020617;
      color: #22c55e;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      text-align: left;
      height: 300px;
      overflow-y: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .line {
      margin-bottom: 5px;
      white-space: pre-wrap;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

<h1>⚡ Dev Environment Security Auditor</h1>

<button onclick="runAudit()">SCAN</button>
<button onclick="runAttack()">EXPLOIT</button>

<div id="terminal" class="terminal">
  <div class="line">> Ready...</div>
</div>

<script>
function addLine(text) {
  const terminal = document.getElementById("terminal");
  const line = document.createElement("div");
  line.className = "line";
  line.innerText = text;
  terminal.appendChild(line);
  terminal.scrollTop = terminal.scrollHeight;
}

function typeLine(text, speed = 20) {
  return new Promise(resolve => {
    const terminal = document.getElementById("terminal");
    const line = document.createElement("div");
    line.className = "line";
    terminal.appendChild(line);

    let i = 0;
    function typing() {
      if (i < text.length) {
        line.innerText += text[i];
        i++;
        setTimeout(typing, speed);
      } else {
        resolve();
      }
    }
    typing();
  });
}

async function runAudit() {
  document.getElementById("terminal").innerHTML = "";

  addLine("> Running security audit...\n");

  const res = await fetch("http://127.0.0.1:8000/api/audit/path");
  const data = await res.json();

  await typeLine("Risk Score: " + data.risk_score);
  await typeLine("Vulnerable: " + data.vulnerable + "\n");

  for (let issue of data.issues) {
    await typeLine(issue);
  }

  addLine("\n> Audit complete.");
}

async function runAttack() {
  document.getElementById("terminal").innerHTML = "";

  addLine("> Initiating exploit...\n");

  const res = await fetch("http://127.0.0.1:8000/api/simulate/attack");
  const data = await res.json();

  const lines = data.output.split("\n");

  for (let line of lines) {
    await typeLine(line, 15);
  }

  await typeLine("\n🔥 SYSTEM COMPROMISED", 30);
}
</script>

</body>
</html>

<script>
async function runAudit() {
  log("> Running environment audit...\n");

  const res = await fetch("http://127.0.0.1:8000/api/audit/path");
  const data = await res.json();

  // ---- Risk Score ----
  document.getElementById("riskScore").innerText = data.risk_score;

  // ---- Vulnerability Table ----
  const table = document.getElementById("vulnTable");
  table.innerHTML = "";

  data.issues.forEach(issue => {
    const row = document.createElement("tr");

    let severity = "LOW";
    if (issue.includes("CRITICAL")) severity = "CRITICAL";
    else if (issue.includes("WARN")) severity = "MEDIUM";

    row.innerHTML = `
      <td>${issue}</td>
      <td>${severity}</td>
      <td>Local System</td>
      <td>Now</td>
    `;

    table.appendChild(row);
  });

  if (data.vulnerable) {
    log("\n[!] Vulnerability detected — system exploitable\n");
  }
}

async function runAttack() {
  log("> Initiating exploit...\n");

  const res = await fetch("http://127.0.0.1:8000/api/simulate/attack");
  const data = await res.json();

  const lines = data.output.split("\n");

  for (let line of lines) {
    log(line);
  }

  log("\n🔥 SYSTEM COMPROMISED");
}

// ---- Terminal Logger ----
function log(text) {
  const term = document.getElementById("terminal");
  const line = document.createElement("div");
  line.innerText = text;
  term.appendChild(line);
  term.scrollTop = term.scrollHeight;
}
</script>
