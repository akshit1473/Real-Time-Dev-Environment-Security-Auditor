<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="UTF-8">
<title>GhostPath</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #0b0e14;
    color: #00FF41;
    font-family: 'JetBrains Mono', monospace;
}

.glow {
    text-shadow: 0 0 10px rgba(0,255,65,0.6);
}
</style>
</head>

<body class="h-screen flex flex-col">

<!-- HEADER -->
<header class="p-4 border-b border-green-500/20 flex justify-between">
    <h1 class="text-xl font-bold glow">GhostPath</h1>
    <div class="flex gap-3">
        <button onclick="runScan()" class="px-4 py-1 border border-green-400 hover:bg-green-400/10">SCAN</button>
        <button onclick="runExploit()" class="px-4 py-1 border border-red-400 text-red-400 hover:bg-red-400/10">EXPLOIT</button>
    </div>
</header>

<!-- MAIN -->
<div class="flex-1 p-6 grid grid-cols-3 gap-6">

    <!-- RISK -->
    <div class="border border-green-500/20 p-6 flex flex-col items-center justify-center">
        <div class="text-sm mb-2">RISK SCORE</div>
        <div id="riskScore" class="text-5xl glow">--</div>
    </div>

    
    <div class="col-span-2 border border-green-500/20 p-4">
        <div class="mb-2 text-sm">DETECTED ISSUES</div>
        <div id="issuesContainer" class="space-y-2 text-sm"></div>
    </div>


    <div class="col-span-3 border border-green-500/20 p-4">
        <div class="mb-2 text-sm">EXPLOIT STATUS</div>
        <div id="exploitStatus" class="space-y-1 text-sm"></div>
    </div>

    <!-- TERMINAL -->
    <div class="col-span-3 border border-green-500/20 p-4 h-48 overflow-y-auto bg-black text-sm">
        <div id="terminal"></div>
    </div>

</div>

<script>
const API = "http://127.0.0.1:8000";

// ---------- TERMINAL ----------
function log(msg) {
    const term = document.getElementById("terminal");
    const line = document.createElement("div");
    line.textContent = msg;
    term.appendChild(line);
    term.scrollTop = term.scrollHeight;
}

// ---------- SCAN ----------
async function runScan() {
    log("[SCAN] Running PATH audit...");

    try {
        const res = await fetch(API + "/api/audit/path");
        const data = await res.json();

        document.getElementById("riskScore").innerText = data.risk_score + "/10";

        const container = document.getElementById("issuesContainer");
        container.innerHTML = "";

        if (data.issues.length === 0) {
            container.innerHTML = "<div class='text-green-400'>No issues detected</div>";
            log("[OK] No vulnerabilities found");
            return;
        }

        data.issues.forEach(issue => {
            const div = document.createElement("div");

            if (issue.includes("CRITICAL")) {
                div.className = "text-red-400";
            } else {
                div.className = "text-yellow-300";
            }

            div.textContent = issue;
            container.appendChild(div);

            log("[ISSUE] " + issue);
        });

        log("[SCAN COMPLETE]");

    } catch (err) {
        log("[ERROR] Scan failed");
    }
}

// ---------- EXPLOIT ----------
async function runExploit() {
    log("[EXEC] Launching PATH hijack simulation...");

    try {
        const res = await fetch(API + "/api/simulate/attack");
        const data = await res.json();

        const panel = document.getElementById("exploitStatus");
        panel.innerHTML = "";

        if (data.status === "blocked") {
    panel.innerHTML = "<div class='text-yellow-300'>Exploit blocked (no vulnerability)</div>";
    log("[BLOCKED] No vulnerability");
    return;
}

if (data.status === "error") {
    panel.innerHTML = "<div class='text-red-400'>Exploit failed</div>";
    log("[ERROR] Exploit failed");
    return;
}

// SUCCESS
panel.innerHTML = "<div class='text-green-400'>Exploit executed successfully</div>";
log("[SUCCESS] Exploit executed");

    data.output.split("\n").forEach(line => log(line));

            const div = document.createElement("div");

            div.textContent = step + " → " + (i === steps.length - 1 ? "SUCCESS" : "DONE");
            div.className = "text-green-400";

            panel.appendChild(div);
        });

        log("[SUCCESS] Exploit executed");

    } catch (err) {
        log("[ERROR] Exploit failed");
    }
}
</script>

</body>
</html>
