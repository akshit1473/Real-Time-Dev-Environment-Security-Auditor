<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GhostPath</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background-color: #0a0f1c;
    background-image:
        radial-gradient(circle at 1px 1px, rgba(0,255,100,0.08) 1px, transparent 0),
        linear-gradient(rgba(0,255,100,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,100,0.03) 1px, transparent 1px);
    background-size: 25px 25px;
    font-family: 'JetBrains Mono', monospace;
}

/* Panels */
.glass {
    background: rgba(20, 25, 35, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,255,100,0.15);
    box-shadow: 0 0 25px rgba(0,255,100,0.05);
}

/* Neon */
.neon-text {
    color: #00ff88;
    text-shadow: 0 0 8px rgba(0,255,120,0.6);
}

.neon-border {
    border: 1px solid #00ff88;
    box-shadow: 0 0 10px rgba(0,255,120,0.4);
}

/* Terminal */
.terminal {
    background: #05080f;
    border: 1px solid rgba(0,255,100,0.2);
    box-shadow: inset 0 0 15px rgba(0,255,100,0.05);
}

/* Terminal header */
.terminal-header {
    background: rgba(0,0,0,0.6);
    border-bottom: 1px solid rgba(0,255,100,0.2);
}

/* Severity */
.critical { color: #ff4d4d; }
.warn { color: #ffc857; }
.ok { color: #00ff88; }

</style>
</head>

<body class="text-green-300">

<div class="p-6">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">

        <!-- LOGO -->
        <div class="flex items-center gap-3">
            <div class="text-green-400 text-xl font-bold tracking-widest">
                GHOST<span class="text-white">PATH</span>
            </div>
            <div class="h-[2px] w-12 bg-green-400 opacity-50"></div>
        </div>

        <!-- ACTIONS -->
        <div class="flex gap-3">
            <button onclick="runScan()" class="neon-border px-4 py-1">SCAN</button>
            <button onclick="runExploit()" 
            class="border border-red-500 text-red-400 px-4 py-1 hover:shadow-[0_0_10px_rgba(255,0,0,0.6)]">
                EXPLOIT
            </button>
        </div>
    </div>

    <!-- SUBTITLE -->
    <div class="text-xs text-gray-400 mb-4">
        LOCAL ENVIRONMENT SECURITY ANALYSIS (PATH FOCUS)
    </div>

    <!-- MAIN GRID -->
    <div class="grid grid-cols-2 gap-6">

        <!-- RISK -->
        <div class="glass p-6">
            <div class="text-sm text-gray-400 mb-2">PATH_RISK_INDEX</div>

            <svg width="200" height="200">
                <circle cx="100" cy="100" r="80" stroke="#222" stroke-width="8" fill="none"/>
                <circle id="riskCircle" cx="100" cy="100" r="80"
                    stroke="#00ff88"
                    stroke-width="8"
                    fill="none"
                    stroke-dasharray="502"
                    stroke-dashoffset="502"
                    style="filter: drop-shadow(0 0 6px #00ff88); transition: 0.5s"/>
            </svg>

            <div id="riskScore" class="text-3xl neon-text mt-2">0</div>
        </div>

        <!-- ISSUES -->
        <div class="glass p-6">
            <div class="text-sm text-gray-400 mb-4">PATH MISCONFIGURATIONS</div>
            <div id="issues">No issues</div>
        </div>
    </div>

    <!-- TERMINAL BLOCK -->
    <div class="mt-6 glass">

        <!-- TERMINAL HEADER -->
        <div class="terminal-header px-4 py-2 flex justify-between items-center text-xs text-gray-400">
            <div>GHOSTPATH CLI // runtime.log</div>
            <div class="flex gap-2">
                <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                <div class="w-3 h-3 bg-yellow-400 rounded-full"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            </div>
        </div>

        <!-- TERMINAL BODY -->
        <div id="terminal" class="terminal p-4 h-64 overflow-y-auto text-sm">
            <div class="ok">[SYSTEM] GhostPath initialized...</div>
        </div>
    </div>

</div>

<script>
function log(msg, cls="") {
    const term = document.getElementById("terminal");
    const line = document.createElement("div");
    line.className = cls;
    line.textContent = msg;
    term.appendChild(line);
    term.scrollTop = term.scrollHeight;
}

function setRisk(score) {
    const circle = document.getElementById("riskCircle");
    const offset = 502 - (score / 10) * 502;
    circle.style.strokeDashoffset = offset;
    document.getElementById("riskScore").innerText = score + "/10";
}

async function runScan() {
    log("[SCAN] Running PATH audit...", "ok");

    const res = await fetch("/api/audit/path");
    const data = await res.json();

    setRisk(data.risk_score || 0);

    const issuesDiv = document.getElementById("issues");
    issuesDiv.innerHTML = "";

    if (!data.issues.length) {
        issuesDiv.innerHTML = "<div class='ok'>No issues</div>";
        log("[OK] No vulnerabilities found", "ok");
    } else {
        data.issues.forEach(i => {
            let cls = i.startsWith("CRITICAL") ? "critical" : "warn";
            issuesDiv.innerHTML += `<div class="${cls}">${i}</div>`;
            log("[ISSUE] " + i, cls);
        });
    }
}

async function runExploit() {
    log("[EXEC] Launching exploit...", "warn");

    const res = await fetch("/api/simulate/attack");
    const data = await res.json();

    log("[RESULT] " + data.output, "ok");
}
</script>

</body>
</html>
